services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ansari}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ansari}
      POSTGRES_DB: ${POSTGRES_DB:-ansari}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ansari}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ansari}:${POSTGRES_PASSWORD:-ansari}@postgres:5432/${POSTGRES_DB:-ansari}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
